<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asset Register — Select a Table</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-titles">
        <h1 id="page-title">Asset Register — Select a Table</h1>
        <p class="header-sub" id="header-sub" hidden>Tables</p>
      </div>
      {% if auth_enabled %}
      <a class="header-logout" href="{{ url_for('logout') }}">Log out</a>
      {% endif %}
    </div>
  </header>
  <main class="site-main">
    <section id="view-home" class="view">
      <div class="home-toolbar">
        <p class="view-intro">Choose a table to open its register.</p>
        <div class="home-toolbar-actions">
          <button type="button" id="btn-new-register-table" class="btn btn-ghost btn-home-action">
            New register table
          </button>
          <button type="button" id="exportAllBtn" class="btn-export-all" aria-label="Export all tables to Excel">
            Export All Tables
          </button>
        </div>
      </div>
      <ul id="table-list" class="table-picker" aria-label="Tables"></ul>
    </section>

    <section id="view-register" class="view" hidden>
      <div class="register-toolbar">
        <button type="button" class="btn btn-ghost" id="btn-back">← All tables</button>
        <span class="breadcrumb" id="register-breadcrumb"></span>
        <div class="register-toolbar-right">
          <input type="file" id="import-excel-file" accept=".xlsx,.xlsm,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" hidden />
          <button type="button" class="btn btn-ghost" id="btn-import-excel">Import Excel</button>
          <button type="button" class="btn btn-primary" id="btn-add">Add row</button>
        </div>
      </div>
      <div class="table-scroll" role="region" aria-label="Register data">
        <table class="data-table" id="data-table">
          <thead id="data-thead"></thead>
          <tbody id="data-tbody"></tbody>
        </table>
      </div>
    </section>

    <section id="view-gatepass" class="view" hidden>
      <div class="register-toolbar">
        <button type="button" class="btn btn-ghost" id="btn-gatepass-back">← All tables</button>
        <span class="breadcrumb">Gatepass register</span>
        <div class="register-toolbar-right">
          <button type="button" class="btn btn-ghost" id="btn-gatepass-export">Export to Excel</button>
          <button type="button" class="btn btn-primary" id="btn-gatepass-add">New Gatepass</button>
        </div>
      </div>
      <div class="table-scroll" role="region" aria-label="Gatepass records">
        <table class="data-table" id="gatepass-table">
          <thead>
            <tr>
              <th>Gatepass No</th>
              <th>Date</th>
              <th>Pass type</th>
              <th>Issued to</th>
              <th>Person</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="gatepass-tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal" id="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <header class="modal-header">
        <h2 id="modal-title">Add row</h2>
        <button type="button" class="btn-icon" id="modal-close" aria-label="Close">×</button>
      </header>
      <form id="modal-form" class="modal-form"></form>
      <footer class="modal-footer">
        <button type="button" class="btn btn-ghost" id="modal-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary" form="modal-form" id="modal-save">Save</button>
      </footer>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
</body>
</html>
