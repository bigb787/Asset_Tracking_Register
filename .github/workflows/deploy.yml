name: Deploy asset-register (SSM)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        shell: bash
        run: |
          set -euo pipefail

          INSTANCE_ID="$(
            aws ec2 describe-instances \
              --filters "Name=tag:Project,Values=asset-register" "Name=instance-state-name,Values=running" \
              --query 'Reservations[0].Instances[0].InstanceId' \
              --output text
          )"

          if [ -z "${INSTANCE_ID}" ] || [ "${INSTANCE_ID}" = "None" ]; then
            echo "No running instance found with tag Project=asset-register"
            exit 1
          fi

          COMMAND_ID="$(
            aws ssm send-command \
              --instance-ids "${INSTANCE_ID}" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy Flask asset-register" \
              --parameters 'commands=[
                "set -euo pipefail",
                "cd /opt/asset-register",
                "git fetch --all",
                "git checkout main || git checkout -B main origin/main",
                "git pull --rebase || true",
                "chmod +x asset-register/deploy.sh",
                "bash -x asset-register/deploy.sh"
              ]' \
              --query 'Command.CommandId' \
              --output text
          )"

          dump_invocation() {
            local json
            json="$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --output json)"
            echo "$json" | jq -r '
              "SSM Status: " + (.Status // "?"),
              "",
              "=== stdout ===",
              (.StandardOutputContent // ""),
              "",
              "=== stderr ===",
              (.StandardErrorContent // "")
            '
          }

          set +e
          aws ssm wait command-executed --command-id "${COMMAND_ID}" --instance-id "${INSTANCE_ID}"
          WAIT_RC=$?
          set -e
          dump_invocation
          if [ "${WAIT_RC}" -ne 0 ]; then
            exit "${WAIT_RC}"
          fi
